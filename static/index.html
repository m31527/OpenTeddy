<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenTeddy Dashboard</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2d3148;
      --accent: #7c6af7;
      --accent-dim: #4b3fc4;
      --text: #e8eaf6;
      --muted: #8888aa;
      --success: #4caf8a;
      --warning: #f0b429;
      --error: #f56565;
      --escalated: #a78bfa;
      --orange: #f97316;
      --orange-dim: #c2510e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    header h1 { font-size: 1.5rem; font-weight: 700; }
    header span.badge {
      background: var(--accent-dim);
      color: #fff;
      border-radius: 999px;
      padding: 0.15rem 0.65rem;
      font-size: 0.72rem;
      font-weight: 600;
    }
    .container { max-width: 960px; margin: 2rem auto; padding: 0 1rem; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .card h2 { font-size: 1.1rem; margin-bottom: 1rem; color: var(--accent); }
    textarea, input[type=text], input[type=number] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 0.7rem 1rem;
      font-size: 0.95rem;
      outline: none;
      transition: border 0.2s;
    }
    textarea:focus, input:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 80px; }
    .row { display: flex; gap: 1rem; align-items: flex-end; flex-wrap: wrap; }
    .field { flex: 1; min-width: 180px; }
    .field label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 0.4rem; }
    button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.65rem 1.4rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    button:hover { background: var(--accent-dim); }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-approve {
      background: #166534;
      color: #bbf7d0;
    }
    .btn-approve:hover { background: #15803d; }
    .btn-reject {
      background: #7f1d1d;
      color: #fecaca;
    }
    .btn-reject:hover { background: #991b1b; }
    .status-badge {
      display: inline-block;
      border-radius: 999px;
      padding: 0.15rem 0.6rem;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
    }
    .status-pending   { background: #2d3148; color: var(--muted); }
    .status-running   { background: #1e3a5f; color: #60a5fa; }
    .status-completed { background: #1a3d2e; color: var(--success); }
    .status-failed    { background: #3d1a1a; color: var(--error); }
    .status-escalated { background: #2d1a4d; color: var(--escalated); }
    .result-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      margin-top: 0.75rem;
      font-size: 0.9rem;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 300px;
      overflow-y: auto;
    }
    .subtask-list { list-style: none; }
    .subtask-list li {
      border-bottom: 1px solid var(--border);
      padding: 0.6rem 0;
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      font-size: 0.88rem;
    }
    .subtask-list li:last-child { border-bottom: none; }
    .subtask-desc { flex: 1; color: var(--text); }
    .subtask-conf { color: var(--muted); font-size: 0.78rem; }
    .skills-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 0.75rem;
    }
    .skill-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.85rem;
    }
    .skill-card .skill-name { font-weight: 700; font-size: 0.9rem; margin-bottom: 0.3rem; }
    .skill-card .skill-desc { font-size: 0.78rem; color: var(--muted); }
    .skill-card .skill-stats { margin-top: 0.5rem; font-size: 0.75rem; color: var(--success); }

    /* ── Toast ──────────────────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.75rem 1.25rem;
      font-size: 0.9rem;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 900;
    }
    #toast.show { opacity: 1; }

    /* ── Approval FAB (floating action button) ──────────────────────────── */
    #approvalFab {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: var(--orange);
      color: #fff;
      border: none;
      border-radius: 999px;
      padding: 0.75rem 1.2rem;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      display: none;
      align-items: center;
      gap: 0.5rem;
      box-shadow: 0 4px 16px rgba(249,115,22,0.4);
      z-index: 800;
      transition: background 0.2s, transform 0.1s;
    }
    #approvalFab:hover { background: var(--orange-dim); transform: scale(1.04); }
    #approvalFab .fab-badge {
      background: #fff;
      color: var(--orange);
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 800;
      padding: 0.05rem 0.5rem;
      min-width: 1.4rem;
      text-align: center;
    }

    /* ── Approval Modal ─────────────────────────────────────────────────── */
    #approvalOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    #approvalOverlay.open { display: flex; }
    #approvalModal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.75rem;
      width: min(680px, 92vw);
      max-height: 80vh;
      overflow-y: auto;
    }
    #approvalModal h3 {
      font-size: 1.15rem;
      color: var(--orange);
      margin-bottom: 1rem;
    }
    .approval-item {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem;
      margin-bottom: 0.85rem;
    }
    .approval-item .tool-name {
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--warning);
      margin-bottom: 0.4rem;
    }
    .approval-item .tool-args {
      font-family: 'Courier New', monospace;
      font-size: 0.82rem;
      color: var(--muted);
      white-space: pre-wrap;
      word-break: break-all;
      margin-bottom: 0.75rem;
      max-height: 140px;
      overflow-y: auto;
    }
    .approval-item .approval-meta {
      font-size: 0.76rem;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }
    .approval-actions {
      display: flex;
      gap: 0.6rem;
    }
    .approval-actions button {
      padding: 0.45rem 1rem;
      font-size: 0.85rem;
    }
    .modal-close {
      float: right;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.35rem 0.85rem;
      font-size: 0.82rem;
      margin-bottom: 0.5rem;
    }
    .modal-close:hover { background: var(--border); }
    .empty-approvals {
      color: var(--muted);
      font-size: 0.9rem;
      text-align: center;
      padding: 1.5rem 0;
    }

    .loader {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Tools panel ────────────────────────────────────────────────────── */
    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 0.65rem;
    }
    .tool-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem;
    }
    .tool-card .tool-name { font-weight: 700; font-size: 0.88rem; margin-bottom: 0.25rem; }
    .tool-card .tool-desc { font-size: 0.76rem; color: var(--muted); }
    .risk-low  { color: var(--success); font-size: 0.7rem; font-weight: 700; margin-top: 0.3rem; }
    .risk-high { color: var(--warning); font-size: 0.7rem; font-weight: 700; margin-top: 0.3rem; }
  </style>
</head>
<body>
  <header>
    <h1>🐻 OpenTeddy</h1>
    <span class="badge">Multi-Agent System</span>
  </header>

  <div class="container">
    <!-- Run Task -->
    <div class="card">
      <h2>▶ Run a Task</h2>
      <div class="field" style="margin-bottom:0.85rem">
        <label>Goal (natural language)</label>
        <textarea id="goal" placeholder="e.g. Research the latest news on quantum computing and summarise the top 3 breakthroughs"></textarea>
      </div>
      <div class="row">
        <div class="field">
          <label>Priority (1–10)</label>
          <input type="number" id="priority" value="5" min="1" max="10" />
        </div>
        <button id="runBtn" onclick="runTask()">Run Task</button>
      </div>
    </div>

    <!-- Result -->
    <div class="card" id="resultCard" style="display:none">
      <h2>📋 Result</h2>
      <div style="display:flex;gap:0.75rem;align-items:center;margin-bottom:0.5rem">
        <span id="resultStatus" class="status-badge"></span>
        <code style="font-size:0.78rem;color:var(--muted)" id="resultTaskId"></code>
      </div>
      <div class="result-box" id="resultSummary"></div>
      <div id="subtaskSection" style="margin-top:1rem;display:none">
        <div style="font-size:0.85rem;color:var(--muted);margin-bottom:0.5rem">Sub-tasks</div>
        <ul class="subtask-list" id="subtaskList"></ul>
      </div>
    </div>

    <!-- Skills -->
    <div class="card">
      <h2>⚙️ Skills Library</h2>
      <div style="margin-bottom:1rem">
        <button onclick="loadSkills()" style="background:transparent;border:1px solid var(--border);color:var(--text)">
          Refresh Skills
        </button>
      </div>
      <div class="skills-grid" id="skillsGrid">
        <div style="color:var(--muted);font-size:0.88rem">No skills loaded yet — run a task to discover skills.</div>
      </div>
    </div>

    <!-- Generate Skill -->
    <div class="card">
      <h2>🔧 Generate Skill Manually</h2>
      <div class="row">
        <div class="field">
          <label>Skill name (snake_case)</label>
          <input type="text" id="skillName" placeholder="e.g. web_search" />
        </div>
        <div class="field" style="flex:2">
          <label>Description</label>
          <input type="text" id="skillDesc" placeholder="Searches the web and returns a summary" />
        </div>
        <button onclick="generateSkill()">Generate</button>
      </div>
    </div>

    <!-- Tools Panel -->
    <div class="card">
      <h2>🛠 Registered Tools</h2>
      <div style="margin-bottom:1rem">
        <button onclick="loadTools()" style="background:transparent;border:1px solid var(--border);color:var(--text)">
          Refresh Tools
        </button>
      </div>
      <div class="tools-grid" id="toolsGrid">
        <div style="color:var(--muted);font-size:0.88rem">Loading tools…</div>
      </div>
    </div>
  </div>

  <!-- Approval FAB -->
  <button id="approvalFab" onclick="openApprovalModal()">
    ⚠️ Approvals needed
    <span class="fab-badge" id="approvalCount">0</span>
  </button>

  <!-- Approval Modal -->
  <div id="approvalOverlay" onclick="maybeCloseModal(event)">
    <div id="approvalModal">
      <button class="modal-close" onclick="closeApprovalModal()">✕ Close</button>
      <h3>⚠️ High-Risk Tool Approvals</h3>
      <div id="approvalList">
        <div class="empty-approvals">No pending approvals.</div>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    const API = '';

    // ── Task execution ─────────────────────────────────────────────────────

    async function runTask() {
      const goal = document.getElementById('goal').value.trim();
      if (!goal) { toast('Please enter a goal.'); return; }
      const priority = parseInt(document.getElementById('priority').value) || 5;

      const btn = document.getElementById('runBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="loader"></span>Running…';

      try {
        const res = await fetch(`${API}/run`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ goal, priority, context: {} }),
        });
        const data = await res.json();
        showResult(data);
        await loadTaskStatus(data.task_id);
      } catch (e) {
        toast('Error: ' + e.message, true);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Run Task';
      }
    }

    function showResult(data) {
      const card = document.getElementById('resultCard');
      card.style.display = 'block';
      document.getElementById('resultTaskId').textContent = data.task_id;
      const statusEl = document.getElementById('resultStatus');
      statusEl.textContent = data.status;
      statusEl.className = 'status-badge status-' + data.status;
      document.getElementById('resultSummary').textContent = data.message || '(processing…)';
    }

    async function loadTaskStatus(taskId) {
      try {
        const res = await fetch(`${API}/tasks/${taskId}`);
        const data = await res.json();
        const statusEl = document.getElementById('resultStatus');
        statusEl.textContent = data.status;
        statusEl.className = 'status-badge status-' + data.status;
        if (data.summary) {
          document.getElementById('resultSummary').textContent = data.summary;
        }
        if (data.subtasks && data.subtasks.length) {
          const section = document.getElementById('subtaskSection');
          section.style.display = 'block';
          const list = document.getElementById('subtaskList');
          list.innerHTML = data.subtasks.map(st => `
            <li>
              <span class="status-badge status-${st.status}" style="flex-shrink:0">${st.status}</span>
              <span class="subtask-desc">${escHtml(st.description)}</span>
              <span class="subtask-conf">${(st.confidence * 100).toFixed(0)}%</span>
            </li>
          `).join('');
        }
      } catch (e) { /* silently ignore */ }
    }

    // ── Skills ─────────────────────────────────────────────────────────────

    async function loadSkills() {
      try {
        const res = await fetch(`${API}/skills`);
        const data = await res.json();
        const grid = document.getElementById('skillsGrid');
        if (!data.skills || !data.skills.length) {
          grid.innerHTML = '<div style="color:var(--muted);font-size:0.88rem">No skills yet.</div>';
          return;
        }
        grid.innerHTML = data.skills.map(s => `
          <div class="skill-card">
            <div class="skill-name">${escHtml(s.name)}</div>
            <div class="skill-desc">${escHtml(s.description)}</div>
            <div class="skill-stats">✓ ${s.success_count}  ✗ ${s.failure_count}  · ${s.status}</div>
          </div>
        `).join('');
      } catch (e) {
        toast('Could not load skills: ' + e.message, true);
      }
    }

    async function generateSkill() {
      const name = document.getElementById('skillName').value.trim();
      const desc = document.getElementById('skillDesc').value.trim();
      if (!name || !desc) { toast('Skill name and description required.'); return; }
      try {
        const res = await fetch(`${API}/skills/generate?name=${encodeURIComponent(name)}&description=${encodeURIComponent(desc)}`, {
          method: 'POST',
        });
        const data = await res.json();
        toast(data.message || 'Skill generated!');
        await loadSkills();
      } catch (e) {
        toast('Error: ' + e.message, true);
      }
    }

    // ── Tools ──────────────────────────────────────────────────────────────

    async function loadTools() {
      try {
        const res = await fetch(`${API}/tools`);
        const data = await res.json();
        const grid = document.getElementById('toolsGrid');
        if (!data.tools || !data.tools.length) {
          grid.innerHTML = '<div style="color:var(--muted);font-size:0.88rem">No tools registered.</div>';
          return;
        }
        grid.innerHTML = data.tools.map(t => `
          <div class="tool-card">
            <div class="tool-name">${escHtml(t.name)}</div>
            <div class="tool-desc">${escHtml(t.description)}</div>
            <div class="risk-${t.risk_level}">${t.risk_level === 'high' ? '⚠️ HIGH RISK' : '✅ low risk'}</div>
          </div>
        `).join('');
      } catch (e) {
        toast('Could not load tools: ' + e.message, true);
      }
    }

    // ── Approvals ──────────────────────────────────────────────────────────

    let _approvalPollTimer = null;

    async function pollApprovals() {
      try {
        const res = await fetch(`${API}/approvals`);
        const data = await res.json();
        const count = (data.approvals || []).length;
        const fab = document.getElementById('approvalFab');
        const badge = document.getElementById('approvalCount');
        badge.textContent = count;
        fab.style.display = count > 0 ? 'flex' : 'none';

        // If modal is open, refresh its contents
        if (document.getElementById('approvalOverlay').classList.contains('open')) {
          renderApprovals(data.approvals || []);
        }
      } catch (e) { /* silently ignore poll errors */ }
    }

    function openApprovalModal() {
      document.getElementById('approvalOverlay').classList.add('open');
      refreshApprovals();
    }

    function closeApprovalModal() {
      document.getElementById('approvalOverlay').classList.remove('open');
    }

    function maybeCloseModal(e) {
      if (e.target === document.getElementById('approvalOverlay')) {
        closeApprovalModal();
      }
    }

    async function refreshApprovals() {
      try {
        const res = await fetch(`${API}/approvals`);
        const data = await res.json();
        renderApprovals(data.approvals || []);
      } catch (e) {
        toast('Could not load approvals: ' + e.message, true);
      }
    }

    function renderApprovals(approvals) {
      const list = document.getElementById('approvalList');
      if (!approvals.length) {
        list.innerHTML = '<div class="empty-approvals">✅ No pending approvals.</div>';
        return;
      }
      list.innerHTML = approvals.map(a => `
        <div class="approval-item" id="approval-${escHtml(a.id)}">
          <div class="tool-name">🔧 ${escHtml(a.tool_name)}</div>
          <div class="approval-meta">
            Task: <code>${escHtml(a.task_id)}</code> &nbsp;·&nbsp;
            ${new Date(a.created_at).toLocaleTimeString()}
          </div>
          <div class="tool-args">${escHtml(JSON.stringify(a.args, null, 2))}</div>
          <div class="approval-actions">
            <button class="btn-approve" onclick="resolveApproval('${escHtml(a.id)}', true)">
              ✅ 批准
            </button>
            <button class="btn-reject" onclick="resolveApproval('${escHtml(a.id)}', false)">
              ❌ 拒絕
            </button>
          </div>
        </div>
      `).join('');
    }

    async function resolveApproval(approvalId, approved) {
      const action = approved ? 'approve' : 'reject';
      try {
        const res = await fetch(`${API}/approvals/${approvalId}/${action}`, {
          method: 'POST',
        });
        if (!res.ok) {
          const err = await res.json();
          toast(err.detail || 'Failed to resolve approval', true);
          return;
        }
        // Animate removal
        const el = document.getElementById(`approval-${approvalId}`);
        if (el) {
          el.style.opacity = '0.4';
          el.style.transition = 'opacity 0.3s';
          setTimeout(() => el.remove(), 350);
        }
        toast(approved ? '✅ 已批准，任務繼續執行' : '❌ 已拒絕，Agent 將嘗試替代方案');
        setTimeout(refreshApprovals, 400);
      } catch (e) {
        toast('Error: ' + e.message, true);
      }
    }

    // ── Toast ──────────────────────────────────────────────────────────────

    function toast(msg, isError = false) {
      // Don't overlap with FAB
      const fab = document.getElementById('approvalFab');
      const toastEl = document.getElementById('toast');
      const fabVisible = fab.style.display !== 'none';
      toastEl.style.bottom = fabVisible ? '4.5rem' : '1.5rem';
      toastEl.textContent = msg;
      toastEl.style.borderColor = isError ? 'var(--error)' : 'var(--border)';
      toastEl.classList.add('show');
      setTimeout(() => toastEl.classList.remove('show'), 3000);
    }

    function escHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    // ── Init ───────────────────────────────────────────────────────────────

    window.onload = () => {
      loadSkills();
      loadTools();
      // Poll for pending approvals every 3 seconds
      pollApprovals();
      setInterval(pollApprovals, 3000);
    };
  </script>
</body>
</html>
